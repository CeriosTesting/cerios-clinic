name: Build Mobile APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Generate mobile .env
        run: node apps/patient-mobile/setup-env.mjs emulator

      - name: Install local node_modules for React Native Gradle plugin
        run: npm --prefix apps/patient-mobile install

      - name: Build release APK
        working-directory: apps/patient-mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cerios-patient-mobile
          path: apps/patient-mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Rename APK
        run: cp apps/patient-mobile/android/app/build/outputs/apk/release/app-release.apk cerios-patient-mobile-${{ inputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Cerios Patient Mobile ${{ inputs.version }}
          body: |
            ## Cerios Patient Mobile ${{ inputs.version }}

            ### Download
            Download the APK below and install it on your Android device.

            ### Setup
            See [MOBILE.md](https://github.com/${{ github.repository }}/blob/main/MOBILE.md) for instructions.
          files: cerios-patient-mobile-${{ inputs.version }}.apk
