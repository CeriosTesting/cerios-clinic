name: Build & Publish Docker Images

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # API services
          - image: api-patient
            dockerfile: infra/docker/Dockerfile.api
            build-args: APP_NAME=api-patient
          - image: api-doctor
            dockerfile: infra/docker/Dockerfile.api
            build-args: APP_NAME=api-doctor
          - image: api-assistant
            dockerfile: infra/docker/Dockerfile.api
            build-args: APP_NAME=api-assistant
          - image: api-admin
            dockerfile: infra/docker/Dockerfile.api
            build-args: APP_NAME=api-admin
          # Frontend portals
          - image: patient-portal
            dockerfile: infra/docker/Dockerfile.frontend
            build-args: APP_NAME=patient-portal
          - image: doctor-portal
            dockerfile: infra/docker/Dockerfile.frontend
            build-args: APP_NAME=doctor-portal
          - image: assistant-portal
            dockerfile: infra/docker/Dockerfile.frontend
            build-args: APP_NAME=assistant-portal
          - image: admin-portal
            dockerfile: infra/docker/Dockerfile.frontend
            build-args: APP_NAME=admin-portal
          # Database init
          - image: db-init
            dockerfile: infra/docker/Dockerfile.db-init
            build-args: ""
          # Infrastructure (baked-in config for clone-free usage)
          - image: keycloak
            dockerfile: infra/docker/Dockerfile.keycloak
            build-args: ""
          - image: postgres
            dockerfile: infra/docker/Dockerfile.postgres
            build-args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
