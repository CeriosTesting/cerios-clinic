services:
  postgres:
    image: postgres:16-alpine
    container_name: clinic-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic_secret}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic} -d ${POSTGRES_DB:-clinic_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: clinic-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_secret}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-clinic_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-clinic}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-clinic_secret}
      KC_DB_SCHEMA: keycloak
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'status' && echo healthy || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  mailpit:
    image: axllent/mailpit:latest
    container_name: clinic-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

volumes:
  postgres_data:
