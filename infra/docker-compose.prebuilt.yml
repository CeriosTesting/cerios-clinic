# ─────────────────────────────────────────────────────────────
# Pre-built images compose file — fully self-contained, no clone needed.
#
# Save this file anywhere and run:
#
#   docker compose -f docker-compose.prebuilt.yml --profile apps up -d --pull always
#
# To stop:
#   docker compose -f docker-compose.prebuilt.yml --profile apps down
#
# To fully reset (removes database volume):
#   docker compose -f docker-compose.prebuilt.yml --profile apps down -v
# ─────────────────────────────────────────────────────────────

services:
  postgres:
    image: ghcr.io/ceriostesting/cerios-clinic/postgres:latest
    container_name: clinic-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clinic_secret}
      POSTGRES_DB: ${POSTGRES_DB:-clinic_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clinic} -d ${POSTGRES_DB:-clinic_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: ghcr.io/ceriostesting/cerios-clinic/keycloak:latest
    container_name: clinic-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_secret}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-clinic_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-clinic}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-clinic_secret}
      KC_DB_SCHEMA: keycloak
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: "8080"
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q 'status' && echo healthy || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  mailpit:
    image: axllent/mailpit:latest
    container_name: clinic-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  # ── App services (only start with --profile apps) ────────

  db-init:
    profiles: [apps]
    container_name: clinic-db-init
    image: ghcr.io/ceriostesting/cerios-clinic/db-init:latest
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-clinic}:${POSTGRES_PASSWORD:-clinic_secret}@postgres:5432/${POSTGRES_DB:-clinic_db}"
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-clinic}
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_secret}
      SEED_STAFF_PASSWORD: ${SEED_STAFF_PASSWORD:-Clinic1234!}
      SEED_PATIENT_PASSWORD: ${SEED_PATIENT_PASSWORD:-Patient1234!}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: "no"

  api-patient:
    profiles: [apps]
    container_name: clinic-api-patient
    image: ghcr.io/ceriostesting/cerios-clinic/api-patient:latest
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-clinic}:${POSTGRES_PASSWORD:-clinic_secret}@postgres:5432/${POSTGRES_DB:-clinic_db}"
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_PUBLIC_URL: "http://localhost:8180"
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-clinic}
      KEYCLOAK_PATIENT_CLIENT_ID: ${KEYCLOAK_PATIENT_CLIENT_ID:-patient-portal-client}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-api-service-client}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-api_service_secret_change_in_prod}
      API_PATIENT_CORS_ORIGINS: "http://localhost:5173"
      PATIENT_PORTAL_URL: "http://localhost:5173"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api-doctor:
    profiles: [apps]
    container_name: clinic-api-doctor
    image: ghcr.io/ceriostesting/cerios-clinic/api-doctor:latest
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-clinic}:${POSTGRES_PASSWORD:-clinic_secret}@postgres:5432/${POSTGRES_DB:-clinic_db}"
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_PUBLIC_URL: "http://localhost:8180"
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-clinic}
      KEYCLOAK_DOCTOR_CLIENT_ID: ${KEYCLOAK_DOCTOR_CLIENT_ID:-doctor-portal-client}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-api-service-client}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-api_service_secret_change_in_prod}
      API_DOCTOR_CORS_ORIGINS: "http://localhost:5174"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api-assistant:
    profiles: [apps]
    container_name: clinic-api-assistant
    image: ghcr.io/ceriostesting/cerios-clinic/api-assistant:latest
    ports:
      - "3003:3003"
    environment:
      PORT: "3003"
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-clinic}:${POSTGRES_PASSWORD:-clinic_secret}@postgres:5432/${POSTGRES_DB:-clinic_db}"
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_PUBLIC_URL: "http://localhost:8180"
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-clinic}
      KEYCLOAK_ASSISTANT_CLIENT_ID: ${KEYCLOAK_ASSISTANT_CLIENT_ID:-assistant-portal-client}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-api-service-client}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-api_service_secret_change_in_prod}
      API_ASSISTANT_CORS_ORIGINS: "http://localhost:5175"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  api-admin:
    profiles: [apps]
    container_name: clinic-api-admin
    image: ghcr.io/ceriostesting/cerios-clinic/api-admin:latest
    ports:
      - "3004:3004"
    environment:
      PORT: "3004"
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-clinic}:${POSTGRES_PASSWORD:-clinic_secret}@postgres:5432/${POSTGRES_DB:-clinic_db}"
      KEYCLOAK_URL: "http://keycloak:8080"
      KEYCLOAK_PUBLIC_URL: "http://localhost:8180"
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-clinic}
      KEYCLOAK_ADMIN_PORTAL_CLIENT_ID: ${KEYCLOAK_ADMIN_PORTAL_CLIENT_ID:-admin-portal-client}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-api-service-client}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-api_service_secret_change_in_prod}
      API_ADMIN_CORS_ORIGINS: "http://localhost:5176"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  patient-portal:
    profiles: [apps]
    container_name: clinic-patient-portal
    image: ghcr.io/ceriostesting/cerios-clinic/patient-portal:latest
    ports:
      - "5173:80"
    depends_on:
      api-patient:
        condition: service_healthy

  doctor-portal:
    profiles: [apps]
    container_name: clinic-doctor-portal
    image: ghcr.io/ceriostesting/cerios-clinic/doctor-portal:latest
    ports:
      - "5174:80"
    depends_on:
      api-doctor:
        condition: service_healthy

  assistant-portal:
    profiles: [apps]
    container_name: clinic-assistant-portal
    image: ghcr.io/ceriostesting/cerios-clinic/assistant-portal:latest
    ports:
      - "5175:80"
    depends_on:
      api-assistant:
        condition: service_healthy

  admin-portal:
    profiles: [apps]
    container_name: clinic-admin-portal
    image: ghcr.io/ceriostesting/cerios-clinic/admin-portal:latest
    ports:
      - "5176:80"
    depends_on:
      api-admin:
        condition: service_healthy

volumes:
  postgres_data:
